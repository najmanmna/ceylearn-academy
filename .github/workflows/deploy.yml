name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ main ] # Triggers when you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js App for Cloudflare
        run: npx @cloudflare/next-on-pages

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: 'ceylearn-academy' # Change this if you want a different CF project name
          directory: '.vercel/output/static' # next-on-pages outputs the build here
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}